<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Swiss Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v1.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            margin-top: 20px;
        }
        #map-container {
            width: 800px;
            height: 600px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        .city {
            fill: #d93025;
            stroke: white;
            stroke-width: 2px;
            cursor: pointer;
            transition: r 0.3s ease;
        }
        .city:hover {
            fill: #ff0000;
            r: 15;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .country {
            fill: #e0e0e0;
            stroke: #333;
            stroke-width: 1px;
        }
    </style>
</head>
<body>

    <h1>Precise Swiss Cities Map</h1>
    <div id="map-container"></div>
    <div id="tooltip" class="tooltip"></div>

    <script>
        // Configuration
        const width = 800;
        const height = 600;
        
        // Swiss Cities Data (Lat, Lon)
        const cities = [
            { name: "Geneva", lat: 46.2044, lon: 6.1432 },
            { name: "Lausanne", lat: 46.5197, lon: 6.6323 },
            { name: "Zurich", lat: 47.3769, lon: 8.5417 },
            { name: "Bern", lat: 46.9480, lon: 7.4474 },
            { name: "Lucerne", lat: 47.0502, lon: 8.3093 },
            { name: "St. Gallen", lat: 47.4245, lon: 9.3767 },
            { name: "Lugano", lat: 46.0037, lon: 8.9511 },
            { name: "Basel", lat: 47.5596, lon: 7.5886 }
        ];

        const svg = d3.select("#map-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const swissUrl = "./swiss-maps.json";


        d3.json(swissUrl).then(data => {
            const key = Object.keys(data.objects)[0]; // Get the first object name automatically
            const geoData = topojson.feature(data, data.objects[key]);
            const projection = d3.geoMercator();
            projection.fitSize([width, height], geoData);

            const path = d3.geoPath().projection(projection);

            svg.append("path")
                .datum(geoData)
                .attr("d", path)
                .attr("class", "country");

                
            // Draw Cities
            const circles = svg.selectAll(".city")
                .data(cities)
                .enter()
                .append("circle")
                .attr("class", "city")
                .attr("r", 8)
                .attr("cx", d => {
                    const coords = projection([d.lon, d.lat]);
                    return coords ? coords[0] : 0;
                })
                .attr("cy", d => {
                    const coords = projection([d.lon, d.lat]);
                    return coords ? coords[1] : 0;
                });

            // Interaction
            const tooltip = d3.select("#tooltip");

            circles
                .on("mouseover", (event, d) => {
                    tooltip.style("opacity", 1)
                           .html(`<strong>${d.name}</strong><br>Lat: ${d.lat}<br>Lon: ${d.lon}`)
                           .style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 28) + "px");
                })
                .on("mousemove", (event) => {
                    tooltip.style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", () => {
                    tooltip.style("opacity", 0);
                })
                .on("click", (event, d) => {
                    handleCityClick(d);
                });

        }).catch(err => {
            console.error("Error loading GeoJSON:", err);
            d3.select("#map-container").append("text")
                .attr("x", width/2)
                .attr("y", height/2)
                .attr("text-anchor", "middle")
                .text("Failed to load map data");
        });

        function handleCityClick(city) {
            console.log(`Action triggered for: ${city.name}`);
        }
    </script>
</body>
</html>
